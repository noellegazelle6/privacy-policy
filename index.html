一、本政策的适用范围

二、我们如何收集和使用您的个人信息

（1）您在使用本软件期间主动向我们提供的信息，如您在注册账号过程中填写的相应信息；

（2）在您使用本软件期间，我们主动收集的相关信息，如在您使用本软件的操作记录或其他日志类数据等。

（1）为实现向您提供本软件的基本功能或服务，您须授权我们收集、使用的必要的信息。如您拒绝提供相应信息，您可能无法正常使用本软件或某个特定的基本功能。

（二）为向您提供本软件的附加功能或服务

2.4. 为向您提供专业支持或帮助

（三）无需获得您授权同意的个人信息收集、使用例外情形

2.8. 您充分知晓，依据可适用的法律，在以下情形中，我们收集、使用您的个人信息无需征得您的授权同意：

2.8.1. 涉及国家安全与利益、社会公共利益的；

2.8.2. 为履行我们的法定职责或者法定义务或者响应政府部门指示所必需的；

2.8.3. 与您签订和履行您作为协议或其他书面文件一方所必需的；

2.8.4. 为应对突发公共卫生事件，或者紧急情况下为保护您和他人的生命健康和财产安全所必需；

2.8.5. 在合理的范围内处理您自行向社会公众公开的个人信息；

2.8.6. 在合理的范围内处理从合法公开披露的信息中收集的您的个人信息（如合法的新闻报道、政府信息公开等渠道）；

三、我们如何存储您的个人信息

3.1. 为确保正常运转、为您获得更轻松的访问体验、我们会将您的部分必要的个人信息（例如：电子邮件、手机号、加密后的用户密码、用户名、订单、举报等）存储在服务器中，便于您在使用本软件时的个人信息同步。

3.2.信息存储的期限。一般而言，我们仅在为实现目的所必需的时间及法律、行政法规所规定的保存期限内保留你的个人信息，例如：

3.2.1. 电子邮件地址：若您需要使用本软件服务，且注册时选择的电子邮箱注册方式时，我们需要一直保存你的电子邮件地址（包括初始注册电子邮件地址、绑定的电子邮件地址等），以保证你正常使用该服务。当你注销账号后，我们将依法删除相应的信息；

3.2.2. 手机号：若您需要使用本软件服务，且注册时选择的手机号注册方式或已绑定手机号时，我们需要一直保存你的手机号（包括初始注册手机号、绑定的手机号等），以保证你正常使用该服务。当你注销账号后，我们将依法删除相应的信息；

3.3. 如出现产品和服务停止运营的情形，我们会采取合理措施保护用户信息安全，包括及时停止继续收集用户信息的活动；停止运营的通知将以逐一送达或公告的形式通知用户；并对所持有的个人信息进行删除或匿名化处理等。

3.4. 原则上，我们在中华人民共和国境内开展业务过程中产生或收集的个人信息，将存储在中华人民共和国境内；除非为向您提供某项服务所必需，我们会在获得您单独同意，并采取其他法律法规要求的措施下，方会向境外传输您的个人信息。

四、我们如何共享、转让、公开披露您的个人信息

我们产品或/及服务中的某些模块和功能将由服务提供商提供，为此，我们可能会与合作伙伴共享您的某些个人信息，以提供更好的客户服务和用户体验。我们在与该等合作伙伴进行合作时，将会遵守以下原则：（1）合法正当与最小必要原则：数据处理应当具有合法性基础，具有正当的目的，并以实现处理目的最小范围为限；（2）用户知情权与决定权最大化原则：数据处理过程中充分尊重用户对其个人信息处理享有的知情权与决定权；（3）安全保障能力最强化原则：我们将采取必要措施保障所处理个人信息的安全，审慎评估合作方使用数据的目的，对这些合作方的安全保障能力进行综合评估，并要求其遵循合作协议的有关要求。

4.1. 委托处理

我们可能委托授权合作伙伴（如我们的关联公司、技术服务方、广告或分析服务类的授权合作伙伴等）处理您的个人信息，以便授权合作伙伴代表我们为您提供某些服务或履行职能。我们仅会在采用行业通用的安全技术前提下（如不会将您的个人身份信息以明文的方式交付授权合作伙伴），出于本政策声明的合法、正当、必要、特定、明确的目的委托其处理您的信息，授权合作伙伴只能接触到其履行职责所需信息，且我们将会通过协议要求其不得将此信息用于其他任何超出委托范围的目的。如果授权合作伙伴将您的信息用于我们未委托的用途，其将单独征得您的同意。

4.2. 第三方共享

原则上，我们不会与其他组织和个人共享您的用户信息，但以下情况除外：

4.2.1. 在获取您明确同意的情况下共享：获得您的明确同意后，我们会与其他方共享您的用户信息。

4.2.2. 为履行法定义务所必需的共享：我们可能会根据法律法规规定、诉讼、仲裁解决需要，或按行政、司法机关依法提出的要求，对外共享您的用户信息。

4.2.3. 为订立、履行您作为一方当事人的合同所必需的情况下的共享。

4.3. SDK 的使用

4.3.1. 为保障本软件的稳定运行、功能实现，使您能够使用和享受更多的服务及功能，我们的应用中会嵌入授权合作伙伴的 SDK 或其他类似的应用程序，该等SDK将可能会采集您的信息，如硬件型号、硬件序列号、操作系统版本号、SD卡数据、MAC地址、唯一设备识别码、软件版本号、网络接入方式及类型、操作日志信息等。关于我们接入的授权合作伙伴 SDK 详情及其采集的具体信息请见《第三方SDK收集使用信息说明》。

4.3.2. 我们会对授权合作伙伴获取有关信息的应用程序接口（ API ）、软件工具开发包（ SDK ）进行严格的安全检测，并与授权合作伙伴约定严格的数据保护措施，令其按照本政策以及其他任何相关的保密和安全措施来处理个人信息。

4.3.3. 对我们与之共享用户信息的公司、组织和个人，我们会与其签署严格的保密协议以及信息保护约定，要求他们按照我们的说明、本政策以及其他任何相关的保密和安全措施来处理用户信息。

4.4. 转让

原则上，我们不会与其他组织和个人共享您的用户信息，但在我们与其他法律主体者发生合并、收购或破产清算情形，或其他涉及合并、收购或破产清算情形时，如涉及到用户信息转让，我们会要求新的持有您用户信息的公司、组织继续受本政策的约束，否则我们将要求该公司、组织和个人重新向您征求授权同意。如涉及破产且无承接方的情形，我们将依法对数据进行删除处理。

4.5. 公开披露

我们仅会在以下情况下公开披露您的用户信息：

4.5.1. 获得您充分同意或基于您的主动选择，我们可能会公开披露您的用户信息；或

4.5.2. 为保护本服务及其关联公司用户或公众的人身财产安全免遭侵害，我们可能依据适用的法律或平台相关协议、规则披露关于您的用户信息。例如，若您作为云市场服务商销售假货或盗版商品，我们可能会公开披露您的店铺主体信息与处罚情况。

4.6. 对外提供用户信息时事先征得授权同意的例外

以下情形中，对外提供用户信息无需事先征得您的授权同意：

4.6.1. 与国家安全、国防安全有关的；

4.6.2. 与公共安全、公共卫生、重大公共利益有关的；

4.6.3. 与刑事侦查、起诉、审判和判决执行等有关的；

4.6.4. 出于维护您或其他个人的生命、财产等重大合法权益但又很难得到本人同意的；

4.6.5. 您自行向社会公众公开的个人信息；

4.6.6. 从合法公开披露的信息中收集个人信息的，如合法的新闻报道、政府信息公开等渠道；

4.6.7. 为履行我们的法定职责或者法定义务或者响应政府部门指示所必需的。

五、您如何管理您的个人信息

5.1. 查阅、变更和补充

5.1.1. 您可通过【本政策披露的联系方式】与我们取得联系，我们将协助您进一步完成相应操作。

5.2. 注销账户

5.2.1. 您可通过【本政策披露的联系方式】提交账号注销申请，我们将在15个工作日内为您处理。

5.2.2. 在您主动注销账户之后，我们将停止为您提供产品或服务，并删除您的个人信息或对其进行匿名化处理，但法律法规或行业监管规则另有规定的除外。

5.3. 响应您的上述请求

5.3.1. 为保障安全，您可能需要提供书面请求，或以其他方式证明您的身份。我们可能会先要求您验证自己的身份，然后再处理您的请求。

5.3.2. 对于您合理的请求，我们原则上不收取费用，但对多次重复、超出合理限度的请求，我们有权酌情收取一定费用。对于与您的身份不直接关联的信息、无合理理由重复申请的信息，或者需要过多的技术手段（如需要开发新系统或从根本上改变现行惯例）、给他人合法权益带来风险或者不切实际的请求，我们可能会予以拒绝。

5.4. 在符合相关法律要求的情况下，您的近亲属经我们身份核实后，可以对您的相关个人信息行使上述查阅、变更、注销等权利，但您另有安排的除外。

5.5. 响应您的权利请求的例外

以下情形中，我们有权不响应您的上述权利请求：

5.5.1. 与我们履行法律法规规定的义务相关的；

5.5.2. 与国家安全、国防安全直接相关的；

5.5.3. 与公共安全、公共卫生、重大公共利益直接相关的；

5.5.4. 与刑事侦查、起诉、审判和执行判决等直接相关的；

5.5.5. 我们有充分证据表明您或其他个人信息主体存在主观恶意或滥用权利的；

5.5.6. 出于维护您或其他个人信息主体的生命、财产等重大合法权益 但又很难得到本人授权同意的；

5.5.7. 响应您或其他个人信息主体的请求将导致您或其他个人信息主体、组织的合法权益受到严重损害的；

5.5.8. 涉及商业秘密的。

六、我们如何保护您的个人信息

6.1. 我们非常重视您的信息安全。我们努力采取各种合理的物理、电子和管理方面的安全措施来保护您的用户信息。防止用户信息遭到未经授权访问、公开披露、使用、修改、损坏或丢失。例如，我们会使用加密技术提高用户信息的安全性；我们会使用受信赖的保护机制防止用户信息遭到恶意攻击；我们会部署访问控制机制，尽力确保只有授权人员才可访问用户信息；以及我们会举办安全和隐私保护培训课程，加强员工对于保护用户信息重要性的认识。

6.2. 我们会采取合理可行的措施，尽力避免收集无关的用户信息。我们只会在达成本政策所述目的所需的期限内保留您的用户信息，除非受到法律的允许。超出上述用户信息保存期限后，我们会对您的个人信息进行删除或匿名化处理。

6.3. 尽管我们已经按照相关法律法规要求采取了合理有效的安全措施，但由于技术限制和可能存在的恶意手段，我们不能保证百分之百的信息安全。请您了解并理解，我们所提供的系统和通信网络可能会受到我们无法控制的因素影响而出现问题。因此，我们强烈建议您采取积极措施来保护个人信息的安全，例如使用复杂密码、定期更改密码、不将账号密码和相关个人信息透露给他人等。

6.4. 在不幸发生用户信息安全事件（泄露、丢失等）后，我们将按照法律法规的要求，及时向您告知：安全事件的基本情况和可能的影响、我们已采取或将要采取的处置措施、您可自主防范和降低风险的建议、对您的补救措施等。我们将及时将事件相关情况以邮件、信函、电话、推送通等等方式告知您，难以逐一告知用户信息主体时，我们会采取合理、有效的方式发布公告。同时，我们还将按照监管部门要求，上报用户信息安全事件的处置情况。

七、未成年人用户信息的特别约定

7.1. 我们主要面向成年人提供本软件及其他相关产品。但我们非常重视对未成年人个人信息的保护，如您为未成年人，我们要求您请您的父母或其他监护人仔细阅读本政策的所有内容，并在征得您的父母或其他监护人同意的前提下使用我们的产品或服务以及向我们提供信息。

7.2. 受制于现有技术和商业模式，我们很难在账号注册环节主动识别未成年人的个人信息，如果您是未成年人的监护人，且您发现我们存在未经其授权获取未成年人个人信息的情况，您可通过本政策中公示的联系方式联系我们，我们在收到通知后会及时予以核查，并在核查属实后及时删除或匿名化处理相关信息。如果我们主动审查发现存在前述情形的，我们也会主动对相关个人信息予以删除或进行匿名化处理。

八、本政策的更新

8.1. 为给您带来更好的服务体验，我们持续努力改进我们的技术。我们可能会更新我们的隐私政策，并通过短信或其他适当的方式提醒您更新的内容，以便您及时了解本隐私政策的最新版本。但未经您明确同意，我们不会限制您按照本政策所享有的权利。

8.2. 对于重大变更，我们还会提供更为显著的通知（包括我们会通过短信、邮件进行通知或向您提供弹窗提示）再次向您告知，并根据法律法规的相关要求征得您的同意。

九、如何联系我们

您对本政策内容有任何疑问和意见，或者您上述实践以及操作上有任何疑问和意见，您可以通过【发送邮件至 noellegazelle@gmail.com 】方式与我们联系，我们将在15天内回复您的请求。
